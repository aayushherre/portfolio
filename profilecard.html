<!DOCTYPE html>
<html>
<head>
  <title>Profile Card</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1120;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .card {
      background: #020617;
      border: 1px solid #1e293b;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 250px;
    }

    img {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 15px;
      border: 1px solid #334155;
      border-radius: 6px;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="card">
  <img src="profile.png">
  <h2>Aayush</h2>
  <p>Frontend Developer</p>
  <a href="#" class="btn">Follow</a>
</div>

</body>
</html>
